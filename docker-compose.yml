services:
  diskovarr:
    image: lebbi/diskovarr:latest
    container_name: diskovarr
    restart: unless-stopped
    ports:
      - "3232:3232"
      # Tuberr (bundled YouTube downloader for Sonarr) — expose so Sonarr can reach it
      - "9832:9832"
    volumes:
      - ./data:/app/data
      # Completed YouTube downloads — mount at the SAME path Sonarr sees so imports work,
      # then set TUBERR_DOWNLOADS_DIR below to match.
      # - /path/to/downloads/tuberr:/downloads/tuberr
    environment:
      # ── Required ──────────────────────────────────────────────────
      - PLEX_URL=http://192.168.1.x:32400
      - PLEX_TOKEN=your_plex_admin_token
      - PLEX_SERVER_ID=your_plex_machine_identifier
      - PLEX_SERVER_NAME=Your Server Name
      - ADMIN_PASSWORD=change_this_to_a_secure_password
      - SESSION_SECRET=change_this_to_a_long_random_string
      # ── Optional (can be set in admin panel instead) ───────────────
      - TAUTULLI_URL=http://192.168.1.x:8181
      - TAUTULLI_API_KEY=your_tautulli_api_key
      - PLEX_MOVIES_SECTION_ID=1
      - PLEX_TV_SECTION_ID=2
      - PORT=3232
      # ── Optional v2.0.0 additions (uncomment to enable) ────────────
      # - TMDB_API_KEY=your_tmdb_api_key
      # - RIVEN_SETTINGS_PATH=/opt/riven/settings.json
      # - APP_URL=https://diskovarr.example.com
      # ── Tuberr (bundled YouTube→Sonarr downloader, v2.5.0) ─────────
      # Starts automatically and pairs itself in Admin → Connections.
      # - TUBERR_ENABLED=false                      # opt out (e.g. Tuberr runs elsewhere)
      # - TUBERR_DOWNLOADS_DIR=/downloads/tuberr    # match the downloads volume above
      # - TUBERR_URL=http://192.168.1.x:9832        # address Sonarr uses to reach Tuberr
