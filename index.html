<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diskovarr</title>
  <meta name="description" content="Personalized Plex recommendations based on your watch history.">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Apply the saved accent as inline styles before first paint. Inline styles
       on <html> win over any stylesheet regardless of load order, so this avoids
       a gold flash on every full page load (e.g. returning from the admin panel).
       ThemeContext keeps 'dk-accent' in sync and is still the source of truth. -->
  <script>
    (function () {
      try {
        var c = localStorage.getItem('dk-accent');
        if (!c || !/^#[0-9a-fA-F]{6}$/.test(c)) return;
        var r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
        var rgb = r + ', ' + g + ', ' + b, s = document.documentElement.style;
        s.setProperty('--accent', c);
        s.setProperty('--accent-rgb', rgb);
        s.setProperty('--accent-dim', 'rgba(' + rgb + ', 0.15)');
        s.setProperty('--accent-dim2', 'rgba(' + rgb + ', 0.20)');
        s.setProperty('--accent-glow', 'rgba(' + rgb + ', 0.08)');
        s.setProperty('--accent-border', 'rgba(' + rgb + ', 0.4)');
        s.setProperty('--accent-shadow', 'rgba(' + rgb + ', 0.4)');
        var h = function (n) { return Math.min(255, Math.round(n + (255 - n) * 0.15)).toString(16).padStart(2, '0'); };
        s.setProperty('--accent-hover', '#' + h(r) + h(g) + h(b));
      } catch (e) { /* no-op */ }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
